<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You got a letter! ✉️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Mitr:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Mitr', sans-serif;
            /* 💜 ใช้โทนม่วงพาสเทลตามที่คุณชอบ */
            background: linear-gradient(135deg, #e1bee7 0%, #b39ddb 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* ข้อความต้อนรับด้านบนซองจดหมาย */
        .intro-text {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            text-shadow: 2px 2px 8px rgba(123, 31, 162, 0.2);
        }

        .intro-text h2 {
            font-family: 'Caveat', cursive;
            font-size: 3.5rem;
            margin-bottom: 5px;
        }

        .intro-text p {
            font-size: 1.1rem;
            font-weight: 300;
            opacity: 0.9;
        }

        /* พื้นที่วางซองจดหมาย */
        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: #f3e5f5;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            border-radius: 0 0 10px 10px;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
        }

        .envelope-wrapper:hover {
            transform: translateY(-5px);
        }

        /* ฝาพับจดหมายด้านบน */
        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 115px solid #d1c4e9;
            transform-origin: top;
            transition: transform 0.5s ease-in-out;
            z-index: 3;
        }

        /* ตัวซองจดหมายด้านหน้า */
        .envelope-front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 150px solid #e1bee7;
            border-right: 150px solid #e1bee7;
            border-bottom: 110px solid #c5cae9;
            z-index: 4;
            border-radius: 0 0 10px 10px;
        }

        /* ตัวปิดผนึกหัวใจสีแดงตอนแรก (Wax Seal) */
        .wax-seal {
            position: absolute;
            width: 60px;
            height: 60px;
            background-color: #ff4d6d; /* สีแดงเด่นๆ ให้รู้ว่าต้องกดตรงนี้ */
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -25%) scale(1);
            z-index: 5;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.6rem;
            transition: all 0.3s ease;
            animation: pulseSeal 1.5s infinite ease-in-out;
        }

        /* หัวใจสีม่วงที่จะโผล่มาด้านในซองหลังจากกดเปิด */
        .purple-heart-link {
            position: absolute;
            width: 80px;
            height: 80px;
            background-color: #8e24aa;
            transform: translate(-50%, 0) rotate(45deg) scale(0);
            top: 40px;
            left: 50%;
            z-index: 2;
            box-shadow: 0 5px 15px rgba(142, 36, 170, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
        }

        .purple-heart-link::before, .purple-heart-link::after {
            content: '';
            width: 80px;
            height: 80px;
            background-color: #8e24aa;
            border-radius: 50%;
            position: absolute;
        }

        .purple-heart-link::before { top: -40px; left: 0; }
        .purple-heart-link::after { top: 0; left: -40px; }

        /* ไอคอนลูกศรชี้ด้านในหัวใจม่วง */
        .purple-heart-link i {
            color: white;
            transform: rotate(-45deg); /* หมุนไอคอนกลับมาให้ตรง */
            font-size: 1.5rem;
            z-index: 6;
            animation: arrowMove 1.2s infinite ease-in-out;
        }

        /* คำแนะนำใต้ซองจดหมาย */
        .hint-text {
            margin-top: 50px;
            font-size: 1rem;
            color: #6a1b9a;
            background: rgba(255, 255, 255, 0.6);
            padding: 8px 20px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        /* ==================== แอนิเมชันตอนกดเปิดซองจดหมาย ==================== */
        
        /* 1. สั่งให้ฝาพับเปิดขึ้น */
        .envelope-wrapper.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        /* 2. ซ่อนหัวใจสีแดงปิดผนึกอันเดิม */
        .envelope-wrapper.open .wax-seal {
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, -25%) scale(0);
        }

        /* 3. สั่งให้หัวใจสีม่วงเด้งโผล่ขึ้นมาจากซอง */
        .envelope-wrapper.open .purple-heart-link {
            transform: translate(-50%, -100px) rotate(45deg) scale(1);
        }

        /* เอฟเฟกต์แอนิเมชันเคลื่อนไหวย่อยๆ */
        @keyframes pulseSeal {
            0%, 100% { transform: translate(-50%, -25%) scale(1); }
            50% { transform: translate(-50%, -25%) scale(1.08); }
        }

        @keyframes arrowMove {
            0%, 100% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="intro-text">
        <h2>มีจดหมายมาส่งงง!</h2>
        <p>มีซองจดหมายปริศนาส่งถึงเธอแหละ ลองเปิดดูสิครับบ</p>
    </div>

    <div class="envelope-wrapper" id="envelope" onclick="openEnvelope()">
        <div class="envelope-flap"></div>
        
        <a href="index.html" class="purple-heart-link" id="purpleHeart" onclick="stopPropagation(event)">
            <i class="fa-solid fa-arrow-right"></i>
        </a>

        <div class="envelope-front"></div>
        
        <div class="wax-seal">
            <i class="fa-solid fa-heart"></i>
        </div>
    </div>

    <div class="hint-text" id="hintBox">
        <i class="fa-solid fa-hand-pointer"></i> คลิกที่ซองจดหมายเพื่อเปิดออก
    </div>

    <script>
        function openEnvelope() {
            const envelope = document.getElementById('envelope');
            const hintBox = document.getElementById('hintBox');

            // เล่นแอนิเมชันเปิดซองจดหมายและดันหัวใจม่วงขึ้นมา
            envelope.classList.add('open');

            // เปลี่ยนข้อความคำแนะนำด้านล่างหลังจากซองเปิดแล้ว
            setTimeout(() => {
                hintBox.innerHTML = '<i class="fa-solid fa-heart" style="color: #8e24aa;"></i> กดที่หัวใจสีม่วงเพื่ออ่านจดหมายต่อเลย!';
                hintBox.style.background = 'rgba(255, 255, 255, 0.9)';
            }, 500);
        }

        // ฟังก์ชันพิเศษป้องกันไม่ให้คลิกหัวใจม่วงแล้วดันไปรันฟังก์ชันเปิดซองซ้ำ
        function stopPropagation(event) {
            event.stopPropagation();
        }
    </script>

</body>
</html>
